<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/dist/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />
  <script src="https://kit.fontawesome.com/46e38faa09.js" crossorigin="anonymous"></script>
  <title>Contacts | Software engineer</title>
</head>

<body>
  <!-- header -->
  <header id="header-inner">
    <div class="container">
      <nav id="main-nav">
        <img src="/dist/img/EO.png" alt="My Portfolio" id="logo" />
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="work.html">Work</a></li>
          <li><a href="contact.html" class="current">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <!-- Contact - a -->
  <section id="contact-a" class="text-center py-3">
    <div class="container">
      <h2 class="section-title">Contact Me</h2>
      <p class="lead">Here is how to connect me</p>
      <form method="POST" data-netlify="true" data-netlify-recaptcha="true">
        <div class="text-fields">
          <input type="text" class="text-input name-input" placeholder="Name" name="name" />
          <input type="text" class="text-input subject-input" placeholder="Contact subject" name="subject" />
          <input type="email" class="text-input email-input" placeholder="Email" name="email" />
          <input type="text" class="text-input phone-input" placeholder="Phone number" name="phone" />
          <textarea class="text-input message-input" placeholder="Write your message here..." name="message"></textarea>
          <div class="my-2">
            <div data-netlify-recaptcha="true"></div>
          </div>
        </div>
        <button class="btn-dark" type="submit">Submit</button>
      </form>
    </div>
  </section>
  <!-- section - b -->
  <section id="contact-b" class="bg-dark py-3">
    <div class="container">
      <div class="contact-info">
        <div>
          <i class="fas fa-envelope fa-2x"></i>
          <h3>Email</h3>
          <p>eochirgarav@gmail.com</p>
        </div>
        <div>
          <i class="fas fa-phone fa-2x"></i>
          <h3>Phone</h3>
          <p>(+1)530-725-9328</p>
        </div>
        <div>
          <i class="fas fa-address-card fa-2x"></i>
          <h3>Address</h3>
          <p>4118 Greenleaf Ct, Park city, IL, 60085</p>
        </div>
      </div>
    </div>
  </section>
  <!-- section - c -->
  <section id="contact-c" class="bg-main py-4">
    <div class="container">
      <h1>"Let's get started on your new project."</h1>
    </div>
  </section>
  <footer id="main-footer">
    <div class="footer-content container">
      <p>Copyright &copy, 2025. All rights reserved.</p>
      <div class="social">
        <i class="fab fa-twitter"></i>
        <i class="fab fa-facebook"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-linkedin"></i>
      </div>
    </div>
  </footer>
</body>

</html>
